<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin – Bröllopsfilm</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>Admin</h1>
    <p class="lead">Samla gästerna här. Själva filmen spelas via YouTube Live.</p>

    <section class="stats">
      <div><strong id="connectedCount">0</strong><span>anslutna</span></div>
      <div><strong id="readyCount">0</strong><span>redo</span></div>
      <div><strong id="missingCount">0</strong><span>saknas</span></div>
    </section>

    <section class="panel">
      <h2>YouTube Live</h2>
      <label class="stacked">
        Länk till livesändningen:
        <input id="youtubeUrlInput" class="url-input" type="url" placeholder="https://www.youtube.com/watch?v=...">
      </label>
      <button id="saveYoutubeUrlBtn" class="secondary">Spara YouTube-länk</button>
      <p id="youtubeUrlStatus" class="small">Ingen länk sparad ännu.</p>
    </section>

    <section class="panel">
      <h2>Start</h2>
      <p class="small">Nedräkningen används nu för att starta gästernas spelare i förväg.</p>
      <label>Nedräkning: <input id="delay" type="number" value="15" min="10" max="30"> sekunder</label>
      <div class="controls">
        <button id="startBtn">STARTA NEDRÄKNING</button>
        <button id="clearStartBtn" class="secondary">Avbryt</button>
        <button id="resetBtn" class="secondary danger">Nollställ session</button>
      </div>
    </section>

    <p id="status">Startar admin...</p>

    <section class="qr-section">
      <h2>Gästlänk</h2>
      <div id="qrcode"></div>
      <p class="small">Gästerna skannar denna QR-kod.</p>
    </section>
    <textarea id="guestLink" readonly></textarea>
    <button id="copyLinkBtn" class="secondary">Kopiera gästlänk</button>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
