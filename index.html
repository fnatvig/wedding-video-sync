<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bröllopsfilm</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>Filmen börjar snart</h1>
    <p class="lead">Tryck på knappen och vänta här. Spelaren förbereds automatiskt under nedräkningen.</p>

    <section class="controls" id="readyPanel">
      <button id="readyBtn">🔊 Jag är redo</button>
      <button id="resetBtn" class="secondary">Ångra redo</button>
    </section>

    <p id="status">Ansluter...</p>

    <section id="livePanel" class="panel hidden">
      <div class="video-wrap">
        <div id="player"></div>
        <div id="countdownOverlay" class="countdown-overlay hidden">
          <div id="countdown">15</div>
          <div class="small">Filmen börjar strax</div>
        </div>
      </div>

      <div id="rescueControls" class="controls rescue hidden">
        <p class="small">Om filmen inte startar eller hamnar efter:</p>
        <button id="playEmbeddedBtn">▶ Starta filmen</button>
        <button id="jumpLiveBtn" class="secondary">Hoppa till live</button>
        <a id="youtubeLinkBig" class="buttonlike secondary" target="_blank" rel="noopener">Öppna i YouTube</a>
      </div>
    </section>

    <details>
      <summary>Debug</summary>
      <pre id="debug"></pre>
    </details>
  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script type="module" src="guest.js"></script>
</body>
</html>
