<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bröllopsfilm</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .video-wrap {
      position: relative;
    }

    .player-click-blocker {
      position: absolute;
      inset: 0;
      z-index: 5;
      background: transparent;
      cursor: default;
      touch-action: none;
    }

    .countdown-overlay {
      z-index: 10;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Filmen börjar snart</h1>
    <p class="lead">Tryck på knappen och vänta här. Spelaren förbereds automatiskt under nedräkningen.</p>

    <section class="controls" id="readyPanel">
      <button id="readyBtn">🔊 Jag är redo</button>
      <button id="resetBtn" class="secondary">Ångra redo</button>
    </section>

    <p id="status">Ansluter...</p>

    <section id="livePanel" class="panel hidden">
      <div class="video-wrap">
        <div id="player"></div>

        <!-- Hindrar gästen från att pausa, spola eller klicka på YouTube-spelaren. -->
        <div class="player-click-blocker" aria-hidden="true"></div>

        <div id="countdownOverlay" class="countdown-overlay hidden">
          <div id="countdown">15</div>
          <div class="small">Filmen börjar strax</div>
        </div>
      </div>

      <div id="rescueControls" class="controls rescue hidden">
        <p class="small">Om filmen inte startar:</p>
        <button id="playEmbeddedBtn">▶ Starta filmen</button>
        <button id="fullscreenBtn" class="secondary">⛶ Helskärm</button>
        <a id="youtubeLinkBig" class="buttonlike secondary" target="_blank" rel="noopener">
          Öppna i YouTube
        </a>
      </div>
    </section>

    <details>
      <summary>Debug</summary>
      <pre id="debug"></pre>
    </details>
  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script type="module" src="guest.js"></script>
</body>
</html>
