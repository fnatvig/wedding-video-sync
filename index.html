<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bröllopsfilm</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>Filmen börjar snart</h1>
    <p class="lead">Tryck på knappen och vänta här. När filmen börjar visas spelaren på denna sida.</p>

    <section class="controls">
      <button id="readyBtn" disabled>Laddar spelare...</button>
      <button id="resetBtn" class="secondary">Ångra redo</button>
    </section>

    <p id="status">Ansluter...</p>
    <p id="countdown"></p>

    <section id="livePanel" class="panel hidden">
      <h2>Gör dig redo</h2>
      <p class="small"><strong>Tryck “Starta filmen” om den inte redan spelar.</strong> Själva filmen börjar strax efter att spelaren öppnats.</p>

      <div class="video-wrap">
        <div id="player"></div>
      </div>

      <div class="controls">
        <button id="playEmbeddedBtn">▶ Starta filmen</button>
        <button id="jumpLiveBtn" class="secondary">Hoppa till live</button>
        <a id="youtubeLinkBig" class="buttonlike secondary" target="_blank" rel="noopener">Öppna i YouTube</a>
      </div>
    </section>

    <details>
      <summary>Debug</summary>
      <pre id="debug"></pre>
    </details>
  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script type="module" src="guest.js"></script>
</body>
</html>
