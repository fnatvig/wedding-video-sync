<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bröllopsfilm</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>Filmen börjar snart</h1>
    <p class="lead">Tryck på knappen och vänta. Filmen öppnas automatiskt när den börjar.</p>

    <section class="controls">
      <button id="readyBtn">Jag är redo</button>
      <button id="resetBtn" class="secondary">Ångra redo</button>
    </section>

    <p id="status">Ansluter...</p>
    <p id="countdown"></p>

    <section id="livePanel" class="panel hidden">
      <h2>Nu börjar filmen</h2>
      <p>Öppnar YouTube Live...</p>
      <a id="youtubeLinkBig" class="buttonlike" target="_blank" rel="noopener">Öppna manuellt</a>
    </section>

    <details>
      <summary>Debug</summary>
      <pre id="debug"></pre>
    </details>
  </main>

  <script type="module" src="guest.js"></script>
</body>
</html>
